[env:esp32-s3-touch-lcd-7b]
platform = espressif32
board = ESP32-S3-Touch-LCD-7B
framework = espidf
monitor_speed = 115200

; --- Flash & PSRAM ---
board_build.flash_size = 16MB
board_build.flash_mode = qio    
board_build.psram_type = opi
board_upload.flash_size = 16MB

; --- Partitions (16MB flash) ---
board_build.partitions = partitions.csv

; --- CPU ---
board_build.f_cpu = 240000000L

; --- Upload ---
upload_speed = 921600
upload_port = /dev/cu.usbmodem114301

; --- Build flags ---
build_flags =
    -DDISABLE_ALL_LIBRARY_WARNINGS
    -DBOARD_HAS_PSRAM
    ; -- LVGL --
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_TICK_PERIOD_MS=2
    -I src
    ; -- Display: 7" 1024x600 RGB, ST7262 --
    -DDISPLAY_WIDTH=1024
    -DDISPLAY_HEIGHT=600
    ; -- RGB interface: no byte swap needed --
    -DLV_COLOR_16_SWAP=0

extra_scripts = pre:extra_scripts.py

lib_deps =
    lvgl/lvgl@9.2.2
